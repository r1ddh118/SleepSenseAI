# Production-style stack: Postgres + Redis + Mosquitto + API + worker + nginx
# Usage: from repo root, with .env containing POSTGRES_PASSWORD, SECRET_KEY
#   docker compose -f packaging/docker-compose.prod.yml --env-file .env up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sleepsense
      POSTGRES_USER: sleepsense
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sleepsense -d sleepsense"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    environment:
      - DATABASE_URL=postgresql://sleepsense:${POSTGRES_PASSWORD}@postgres/sleepsense
      - REDIS_URL=redis://redis:6379/0
      - MQTT_BROKER_HOST=mosquitto
      - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mosquitto:
        condition: service_started
    expose:
      - "8000"

  worker:
    build:
      context: ..
      dockerfile: api/Dockerfile
    command: celery -A tasks worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql://sleepsense:${POSTGRES_PASSWORD}@postgres/sleepsense
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  postgres_data:
